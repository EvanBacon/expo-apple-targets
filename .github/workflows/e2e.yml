name: E2E Build Tests

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "packages/apple-targets/**"
      - "packages/create-target/templates/**"
      - "packages/spm/**"

jobs:
  e2e-apple-targets:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --ignore-scripts

      - name: Build packages
        run: bun run prepare

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-targets-${{ runner.os }}-${{ hashFiles('packages/apple-targets/e2e/fixture/**') }}
          restore-keys: |
            deriveddata-targets-${{ runner.os }}-

      - name: Run E2E build tests
        run: bun run test:e2e
        working-directory: packages/apple-targets

  e2e-spm:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --ignore-scripts

      - name: Build packages
        run: bun run prepare

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-spm-${{ runner.os }}-${{ hashFiles('packages/spm/e2e/fixture/**') }}
          restore-keys: |
            deriveddata-spm-${{ runner.os }}-

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('packages/spm/e2e/fixture/app.json') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Run SPM E2E build tests
        run: bun run test:e2e
        working-directory: packages/spm
